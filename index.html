<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eaglebook - Soar Above the Noise</title>
    <style>
        body {
            margin: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .hero {
            max-width: 600px;
            padding: 20px;
        }
        .logo {
            font-size: 3rem;
            font-weight: 800;
            color: #FFD700;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            line-height: 1.2;
        }
        p {
            color: #a0a0a0;
            font-size: 1.2rem;
            margin-bottom: 35px;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 350px;
            margin: 0 auto;
        }
        input {
            background-color: #1a1a1a;
            border: 2px solid #333;
            color: #fff;
            padding: 14px 20px;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #FFD700;
        }
        .cta-btn {
            background-color: #FFD700;
            color: #121212;
            padding: 14px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            transition: transform 0.2s ease;
        }
        .cta-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="logo">🦅 EAGLEBOOK</div>
        <h1>Soar Above the Noise.</h1>
        <p>Social media built for freedom. No invasive tracking. Just your real community, in real-time.</p>
        
        <div class="form-container">
            <input type="text" placeholder="Choose your @username">
            <input type="email" placeholder="Enter your email address">
            <button class="cta-btn">Create Account</button>
        </div>
    </div>

</body>
</html>
